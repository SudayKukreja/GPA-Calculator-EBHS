<!DOCTYPE html>
<html>
<head>
    <title>EBHS GPA Calculator</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <link rel="icon" type="image/png" href="EBPS_Seal_greenback_400x400.png">
</head>
<body>
    <div id="site-branding">
        <img src="EBPS_Seal_greenback_400x400.png" alt="EBHS Logo" id="site-logo">
        EBHS GPA Calculator
    </div>

    <h1>EBHS GPA Calculator</h1>

    <div id="class-controls">
        <div id="add-class-container"></div>

        <div id="class-counter">Number of classes: 0</div>
    </div>

    <form id="calculatorForm" onsubmit="event.preventDefault(); calculateGPA();">
        <div id="class-details"></div>
        <div style="text-align: center; margin-top: 10px;">
            <button type="submit">Calculate GPA</button>
        </div>
    </form>

    <div id="result">
        <h2 id="weighted-gpa"></h2>
        <h2 id="unweighted-gpa"></h2>
    </div>

    <div id="comparison" style="display:none;">
        <p id="ebhs-weighted"></p>
        <p id="ebhs-unweighted"></p>
        <p id="us-weighted"></p>
        <p id="us-unweighted"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
